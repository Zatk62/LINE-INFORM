<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- พื้นหลังไล่ระดับแบบล้ำสมัย -->
    <linearGradient id="bg_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>

    <!-- สีแดงเมทัลลิค -->
    <linearGradient id="shield_red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>

    <!-- สีขาวมุกมิติแสง -->
    <linearGradient id="shield_white" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>

    <!-- ฟิลเตอร์เรืองแสง -->
    <filter id="shield_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 1. พื้นหลังไอคอน (Rounded Square) -->
  <rect width="400" height="400" x="56" y="56" rx="100" fill="url(#bg_gradient)" filter="drop-shadow(0px 20px 40px rgba(0,0,0,0.3))"/>
  
  <!-- 2. วงแหวนพลังงาน (Energy Rings - Gimmick) -->
  <circle cx="256" cy="256" r="160" stroke="white" stroke-opacity="0.1" stroke-width="2" stroke-dasharray="20 10"/>
  <circle cx="256" cy="256" r="180" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <!-- 3. ตัวโล่ (The Shield) -->
  <g filter="url(#shield_glow)">
    <!-- โล่ซีกซ้าย (สีแดง) -->
    <path d="M256 120 C200 120 140 140 140 220 C140 320 256 400 256 400 V120Z" fill="url(#shield_red)"/>
    
    <!-- โล่ซีกขวา (สีขาว) -->
    <path d="M256 120 C312 120 372 140 372 220 C372 320 256 400 256 400 V120Z" fill="url(#shield_white)"/>

    <!-- ลายกนกสลักบนโล่ (Thai Gimmick) -->
    <path d="M210 240 Q190 200 220 180 Q240 210 230 250" stroke="white" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M302 240 Q322 200 292 180 Q272 210 282 250" stroke="#7F1D1D" stroke-opacity="0.2" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- ขอบโล่เพิ่มความเงาเงา (Bevel Edge) -->
    <path d="M256 120 L372 220 L256 400 L140 220 Z" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="2"/>
  </g>

  <!-- 4. แสงสะท้อนผิวหน้า (Specular Highlight) -->
  <path d="M180 180 Q256 150 332 180" stroke="white" stroke-opacity="0.4" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  
  <!-- จุดแสงสปอตไลท์เล็กๆ (Tech Dots) -->
  <circle cx="256" cy="140" r="4" fill="white" filter="blur(2px)"/>
</svg>