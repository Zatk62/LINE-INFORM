<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 1. พื้นหลังแอป (ไล่เฉดสีน้ำเงินล้ำยุค) -->
  <rect width="512" height="512" rx="114" fill="url(#bg_gradient)"/>
  
  <!-- 2. ตกแต่งพื้นหลังด้วยเส้น Grid จางๆ (Engineering Look) -->
  <path d="M0 128H512M0 256H512M0 384H512M128 0V512M256 0V512M384 0V512" stroke="white" stroke-opacity="0.05" stroke-width="2"/>

  <!-- 3. กลุ่มตัวอักษร SQE แบบ Stylized -->
  <g filter="url(#glow)">
    <!-- ตัว S (Sleek Curve) -->
    <path d="M120 200C120 180 140 160 170 160H210V220H160C140 220 120 240 120 260V300C120 330 140 350 170 350H220V290H170C150 290 120 270 120 260" stroke="#E2E8F0" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- ตัว Q (เป้าเล็ง Quality) -->
    <circle cx="280" cy="256" r="85" stroke="#60A5FA" stroke-width="28"/>
    <path d="M335 315L375 370" stroke="#60A5FA" stroke-width="28" stroke-linecap="round"/>
    
    <!-- ตัว E (Geometric structure) -->
    <path d="M390 160H460M390 256H440M390 350H460M390 160V350" stroke="#34D399" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 4. ตกแต่งจุดประสง (Tech Dots) -->
  <circle cx="460" cy="160" r="8" fill="#34D399"/>
  <circle cx="375" cy="370" r="8" fill="#60A5FA"/>

  <!-- การตั้งค่าสีและเอฟเฟกต์ -->
  <defs>
    <linearGradient id="bg_gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    
    <filter id="glow" x="80" y="120" width="450" height="300" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
</svg>
