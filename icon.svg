<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 1. พื้นหลังมิติแสง (Deep Navy Depth) -->
  <defs>
    <!-- รัศมีแสงตรงกลาง -->
    <radialGradient id="bg_light" cx="50%" cy="50%" r="50%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    
    <!-- สีทองแบบพรีเมียม -->
    <linearGradient id="gold_metallic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>

    <!-- เอฟเฟกต์เรืองแสงทอง -->
    <filter id="premium_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- วาดพื้นหลัง -->
  <rect width="512" height="512" rx="120" fill="url(#bg_light)"/>
  
  <!-- ลายเส้นแสงขัดจางๆ เพิ่มความล้ำ (Subtle Tech Grid) -->
  <circle cx="256" cy="256" r="200" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <path d="M0 256H512M256 0V512" stroke="white" stroke-opacity="0.02" stroke-width="1"/>

  <!-- 2. กลุ่มอักษร SQE ออกแบบใหม่ให้อ่านง่าย -->
  <g filter="url(#premium_glow)">
    <!-- ตัว S: โครงสร้างชัดเจน ตวัดปลายแบบกนก -->
    <path d="M100 230C100 170 185 165 185 205C185 220 150 230 120 250C90 270 95 330 180 335" 
          stroke="url(#gold_metallic)" stroke-width="32" stroke-linecap="round"/>
    <circle cx="100" cy="230" r="12" fill="url(#gold_metallic)"/> <!-- หัวอักษรไทย -->

    <!-- ตัว Q: วงกลมมาตรฐาน หางตวัดเฉียงอ่านง่าย -->
    <circle cx="270" cy="256" r="75" stroke="url(#gold_metallic)" stroke-width="32"/>
    <path d="M315 315C335 335 350 355 375 355" 
          stroke="url(#gold_metallic)" stroke-width="32" stroke-linecap="round"/>

    <!-- ตัว E: ขีด 3 เส้นชัดเจน แต่มีความโค้งมน -->
    <path d="M400 175H475M400 256H460M400 337H475M405 175V337" 
          stroke="url(#gold_metallic)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="475" cy="175" r="10" fill="url(#gold_metallic)"/> <!-- จุดประดับปลาย -->
  </g>
</svg>
