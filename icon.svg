<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: Deep Tech Space -->
    <radialGradient id="bg_deep" cx="50%" cy="50%" r="60%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>

    <!-- Red Metal (Left Shield) -->
    <linearGradient id="metal_red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5F6D"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>

    <!-- White Pearl (Right Shield) -->
    <linearGradient id="metal_white" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>

    <!-- Glow & Shadow Effects -->
    <filter id="ultra_glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 1. Background Frame -->
  <rect width="420" height="420" x="46" y="46" rx="110" fill="url(#bg_deep)" filter="drop-shadow(0px 30px 60px rgba(0,0,0,0.5))"/>
  
  <!-- 2. "Helping Wings" (ลายกนกช่วยงาน - Futuristic Support) -->
  <g opacity="0.6" filter="url(#ultra_glow)">
    <!-- ปีกซ้าย -->
    <path d="M140 380 Q80 320 120 220 Q150 280 200 300" stroke="#818CF8" stroke-width="8" stroke-linecap="round" fill="none"/>
    <!-- ปีกขวา -->
    <path d="M372 380 Q432 320 392 220 Q362 280 312 300" stroke="#818CF8" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- 3. The Main Shield (Red & White) -->
  <g filter="url(#ultra_glow)">
    <!-- ด้านซ้าย (Red) -->
    <path d="M256 100 C180 100 120 130 120 230 C120 350 256 420 256 420 V100Z" fill="url(#metal_red)"/>
    <!-- ด้านขวา (White) -->
    <path d="M256 100 C332 100 392 130 392 230 C392 350 256 420 256 420 V100Z" fill="url(#metal_white)"/>
    
    <!-- Central Processing Diamond (แกนหลักแห่งการช่วยเหลือ) -->
    <path d="M256 200 L286 240 L256 280 L226 240 Z" fill="#F8FAFC" filter="drop-shadow(0 0 10px white)"/>
    <circle cx="256" cy="240" r="4" fill="#38BDF8"/>
  </g>

  <!-- 4. Thai Gimmick: ลายสลักกนกแบบ Tech Line -->
  <path d="M160 200 Q140 240 180 280" stroke="white" stroke-opacity="0.3" stroke-width="3" fill="none"/>
  <path d="M352 200 Q372 240 332 280" stroke="#450A0A" stroke-opacity="0.2" stroke-width="3" fill="none"/>

  <!-- 5. Floating Tasks (งานที่ถูกจัดการ) -->
  <g opacity="0.8">
    <rect x="420" y="150" width="12" height="12" rx="2" transform="rotate(45 420 150)" fill="white"/>
    <rect x="80" y="180" width="10" height="10" rx="2" transform="rotate(45 80 180)" fill="#EF4444"/>
    <rect x="100" y="350" width="14" height="14" rx="2" transform="rotate(45 100 350)" fill="#818CF8"/>
  </g>

  <!-- 6. Light Reflection (ความเงาของชิ้นงาน) -->
  <path d="M180 140 Q256 110 332 140" stroke="white" stroke-opacity="0.4" stroke-width="12" stroke-linecap="round"/>
</svg>
