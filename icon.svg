<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- พื้นหลังไล่เฉดน้ำเงินเข้มหลายชั้นเพื่อมิติที่ลึกขึ้น -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#05070f"/>
      <stop offset="35%" stop-color="#081842"/>
      <stop offset="70%" stop-color="#0f2f7a"/>
      <stop offset="100%" stop-color="#132a5c"/>
    </linearGradient>

    <!-- แสงกลางฉากแบบ spotlight ให้พื้นหลังมีความลึก -->
    <radialGradient id="bgSpot" cx="50%" cy="38%" r="65%">
      <stop offset="0%"  stop-color="#1b3f9e" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#0f2260" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- วีเนตต์มุมภาพให้ขอบเข้มขึ้น เพิ่มมิติ -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <!-- ผิวมันวาวด้านบนแบบไอคอนแอปพรีเมียม -->
    <radialGradient id="glossGrad" cx="50%" cy="6%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- เฉดตัวหนังสือ SQE -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d7e6ff"/>
    </linearGradient>

    <!-- เฉดหมวกเซฟตี้สีเหลือง -->
    <linearGradient id="hatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="55%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- เฉดชุดยูนิฟอร์มช่าง -->
    <linearGradient id="uniformGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- เงานุ่มใต้ตัวหนังสือ/มาสคอต -->
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.5"/>
    </filter>

    <filter id="mascotShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000814" flood-opacity="0.55"/>
    </filter>

    <!-- ความโค้งแบบ squircle มาตรฐานไอคอนแอป -->
    <clipPath id="squircleClip">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- ================= พื้นหลัง (เข้มขึ้น + มีมิติมากขึ้น) ================= -->
  <g clip-path="url(#squircleClip)">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgGrad)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#bgSpot)"/>

    <!-- ออร่าสีม่วง/ฟ้าฝังลึกให้มีมิติ แบบเดียวกับธีมแอป -->
    <circle cx="440" cy="460" r="150" fill="#7c3aed" opacity="0.14"/>
    <circle cx="40" cy="480" r="120" fill="#0ea5e9" opacity="0.10"/>
    <circle cx="60" cy="40" r="110" fill="#4f46e5" opacity="0.14"/>

    <!-- ผิวมันวาวด้านบน -->
    <rect x="0" y="0" width="512" height="512" fill="url(#glossGrad)"/>

    <!-- วีเนตต์มุมภาพ -->
    <rect x="0" y="0" width="512" height="512" fill="url(#vignette)"/>

    <!-- กรอบขอบในบางๆ ให้ดูเป็นกระจก -->
    <rect x="6" y="6" width="500" height="500" rx="106" ry="106"
          fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3"/>
  </g>

  <!-- ================= มาสคอตช่าง (อยู่กึ่งกลางด้านบน) ================= -->
  <g id="mascot" filter="url(#mascotShadow)" transform="translate(76,-20)">

    <!-- โดมหมวกเซฟตี้ -->
    <path d="M 78 218 Q 80 122 148 118 Q 216 122 218 218 Z" fill="url(#hatGrad)"/>
    <!-- ปุ่มหมวกด้านบน -->
    <circle cx="148" cy="122" r="7" fill="#ca8a04"/>
    <!-- เส้นสันหมวก -->
    <path d="M 148 122 Q 150 165 150 218" fill="none" stroke="#eab308" stroke-width="3" opacity="0.6"/>

    <!-- ใบหน้า (โผล่ใต้หมวก) -->
    <circle cx="148" cy="252" r="44" fill="#ffd9b0"/>

    <!-- ปีกหมวก (ทับหน้าผาก) -->
    <ellipse cx="148" cy="220" rx="72" ry="19" fill="#f59e0b"/>
    <!-- สตั๊ดตราแบรนด์หน้าหมวก -->
    <circle cx="148" cy="220" r="9" fill="#1d4ed8" stroke="#0b1230" stroke-width="2"/>

    <!-- แก้มยิ้มบุ๋มสีชมพูอ่อน -->
    <ellipse cx="120" cy="262" rx="7" ry="4.5" fill="#fca5a5" opacity="0.35"/>
    <ellipse cx="176" cy="262" rx="7" ry="4.5" fill="#fca5a5" opacity="0.35"/>

    <!-- ดวงตา -->
    <circle cx="133" cy="253" r="5.5" fill="#1e293b"/>
    <circle cx="163" cy="253" r="5.5" fill="#1e293b"/>
    <!-- รอยยิ้ม -->
    <path d="M 132 266 Q 148 278 164 266" fill="none" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/>

    <!-- คอเสื้อ -->
    <rect x="136" y="290" width="24" height="18" fill="#ffd9b0"/>

    <!-- ลำตัว/ชุดยูนิฟอร์มช่าง -->
    <rect x="88" y="304" width="122" height="112" rx="30" fill="url(#uniformGrad)"/>

    <!-- ปกเสื้อรูปตัว V -->
    <path d="M 118 304 L 149 332 L 180 304 L 180 316 L 149 346 L 118 316 Z" fill="#0b1230"/>

    <!-- ป้ายชื่อ (ID Card) -->
    <rect x="100" y="322" width="24" height="15" rx="3" fill="#f8fafc" stroke="#1d4ed8" stroke-width="1.5"/>
    <circle cx="107" cy="329.5" r="2.4" fill="#1d4ed8"/>

    <!-- กระเป๋าเสื้อ + ปากกา -->
    <rect x="163" y="350" width="27" height="23" rx="4" fill="#1e40af" stroke="#0b1230" stroke-width="1.5"/>
    <line x1="177" y1="344" x2="182" y2="362" stroke="#f8fafc" stroke-width="3.4" stroke-linecap="round"/>

    <!-- แขนขวาชูเวอร์เนีย คาลิเปอร์ -->
    <path d="M 197 312 C 226 316, 238 335, 235 358 C 233 373, 212 380, 199 369 C 190 359, 189 325, 197 312 Z"
          fill="url(#uniformGrad)"/>
    <!-- มือ -->
    <circle cx="236" cy="365" r="15.5" fill="#ffd9b0"/>

    <!-- เวอร์เนีย คาลิเปอร์ -->
    <g>
      <!-- คานหลัก -->
      <rect x="224" y="356" width="82" height="10" rx="2.5" fill="#e2e8f0" stroke="#64748b" stroke-width="1.4"/>
      <!-- ขาจับตายตัว (บน-ล่าง) -->
      <rect x="224" y="334" width="8" height="24" rx="2" fill="#94a3b8"/>
      <rect x="224" y="360" width="8" height="30" rx="2" fill="#94a3b8"/>
      <!-- ขาสไลด์ (เน้นสีฟ้า) -->
      <rect x="278" y="346" width="7" height="42" rx="2" fill="#1d4ed8"/>
      <circle cx="281.5" cy="392" r="5.5" fill="#0b1230"/>
      <!-- ขีดสเกล -->
      <line x1="240" y1="356" x2="240" y2="350" stroke="#64748b" stroke-width="1.2"/>
      <line x1="252" y1="356" x2="252" y2="350" stroke="#64748b" stroke-width="1.2"/>
      <line x1="264" y1="356" x2="264" y2="350" stroke="#64748b" stroke-width="1.2"/>
    </g>
  </g>

  <!-- ================= ตัวอักษร SQE (อยู่ด้านล่างมาสคอต กึ่งกลางภาพ) ================= -->
  <g filter="url(#softShadow)">
    <text x="256" y="462"
          text-anchor="middle"
          font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
          font-weight="900"
          font-size="128"
          letter-spacing="2"
          fill="url(#textGrad)">SQE</text>
  </g>
</svg>